# fly.toml app configuration file generated for atlas-kids on 2026-04-27T09:41:08-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'atlas-kids'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'
  PORT = '8080'

[[mounts]]
  source = 'atlas_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
