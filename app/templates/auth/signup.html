<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Atlas — Create your family account</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/atlas.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">📚</div>
    <h1 class="auth-title">Create your family account</h1>
    <p class="auth-sub">One account, unlimited readers.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.signup_post') }}" class="auth-form">
      <label class="auth-label">
        Family name
        <input class="auth-input" type="text" name="name" value="{{ name or '' }}"
               placeholder="The Johnsons" required autofocus/>
      </label>
      <label class="auth-label">
        Email
        <input class="auth-input" type="email" name="email" value="{{ email or '' }}"
               placeholder="parent@example.com" required/>
      </label>
      <label class="auth-label">
        Password
        <input class="auth-input" type="password" name="password"
               placeholder="At least 8 characters" required minlength="8"/>
      </label>
      <label class="auth-label">
        Confirm password
        <input class="auth-input" type="password" name="confirm"
               placeholder="Repeat password" required minlength="8"/>
      </label>
      <button class="auth-btn" type="submit">Create account</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>
