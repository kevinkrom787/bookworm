<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Atlas — Create your family account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
</head>
<body>
<div class="auth-shell">
  <canvas class="auth-star-canvas" id="starCanvas" aria-hidden="true"></canvas>

  <div class="auth-card">
    <div class="auth-logo">🌙</div>
    <h1 class="auth-title">Create your family account</h1>
    <p class="auth-sub">One account, unlimited readers.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.signup_post') }}" class="auth-form" id="authForm">
      <label class="auth-label">
        Family name
        <div class="auth-input-wrap">
          <input class="auth-input" type="text" name="name" value="{{ name or '' }}"
                 placeholder="The Johnsons" required autofocus autocomplete="organization"/>
        </div>
      </label>
      <label class="auth-label">
        Email
        <div class="auth-input-wrap">
          <input class="auth-input" type="email" name="email" value="{{ email or '' }}"
                 placeholder="parent@example.com" required autocomplete="email"/>
        </div>
      </label>
      <label class="auth-label">
        Password
        <div class="auth-input-wrap">
          <input class="auth-input auth-input--pw" type="password" name="password" id="pw1"
                 placeholder="At least 8 characters" required minlength="8" autocomplete="new-password"/>
          <button type="button" class="auth-pw-toggle" aria-label="Show password" data-target="pw1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </label>
      <label class="auth-label">
        Confirm password
        <div class="auth-input-wrap">
          <input class="auth-input auth-input--pw" type="password" name="confirm" id="pw2"
                 placeholder="Repeat password" required minlength="8" autocomplete="new-password"/>
          <button type="button" class="auth-pw-toggle" aria-label="Show password" data-target="pw2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </label>
      <button class="auth-btn" type="submit" id="submitBtn">
        Create account
        <span class="auth-btn-spinner"></span>
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</div>

<script>
// Star canvas
(function () {
  const canvas = document.getElementById("starCanvas");
  const ctx = canvas.getContext("2d");
  let stars = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function init() {
    stars = Array.from({ length: 55 }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.3 + 0.3, target: Math.random() * 0.55 + 0.1,
      speed: Math.random() * 0.005 + 0.002, phase: Math.random() * Math.PI * 2
    }));
  }
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const o = s.target * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,170,140,${o})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  resize(); init(); requestAnimationFrame(draw);
  window.addEventListener("resize", () => { resize(); init(); });
}());

// Password show/hide
document.querySelectorAll(".auth-pw-toggle").forEach(btn => {
  btn.addEventListener("click", () => {
    const input = document.getElementById(btn.dataset.target);
    input.type = input.type === "password" ? "text" : "password";
    btn.style.color = input.type === "text"
      ? "rgba(245,217,122,0.7)"
      : "rgba(240,235,224,0.3)";
  });
});

// Loading state on submit
document.getElementById("authForm").addEventListener("submit", () => {
  const btn = document.getElementById("submitBtn");
  btn.classList.add("is-loading");
  btn.disabled = true;
});
</script>
</body>
</html>
