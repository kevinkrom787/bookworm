<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Tonight's Story</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Nunito', sans-serif; }

    /* ── Shell ─────────────────────────────────────────── */
    .setup-shell {
      height: 100dvh;
      background: #0d0b1a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ────────────────────────────────────────── */
    .setup-header {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px 12px;
      flex-shrink: 0;
    }

    .setup-back-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.07);
      color: rgba(240,235,224,0.6);
      flex-shrink: 0;
      margin-top: 2px;
      transition: background 0.15s;
      text-decoration: none;
    }
    .setup-back-btn:hover { background: rgba(255,255,255,0.12); }

    .setup-header-text { flex: 1; min-width: 0; }

    .setup-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: #f5d97a;
      text-shadow: 0 0 24px rgba(245,217,122,0.35);
      letter-spacing: -0.01em;
    }

    .setup-preview {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(240,235,224,0.35);
      margin-top: 3px;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.3s;
    }
    .setup-preview.is-ready { color: rgba(245,217,122,0.65); }

    /* ── Error ─────────────────────────────────────────── */
    .setup-error {
      background: rgba(220,38,38,0.12);
      color: #fca5a5;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 18px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* ── Scrollable body ───────────────────────────────── */
    .setup-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding: 4px 0 8px;
    }
    .setup-body::-webkit-scrollbar { display: none; }

    /* ── Section ───────────────────────────────────────── */
    .setup-section-label {
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,217,122,0.45);
      padding: 0 18px;
      margin-bottom: 10px;
    }

    /* ── Carousel row ──────────────────────────────────── */
    .carousel {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: visible;
      padding: 8px 18px 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* allow cards to expand visually without clipping */
      clip-path: none;
    }
    .carousel::-webkit-scrollbar { display: none; }

    /* ════════════════════════════════════════════════════
       CHARACTER CARDS
       Default: compact square. Hover: wider + glow burst.
    ════════════════════════════════════════════════════ */
    .char-card {
      flex-shrink: 0;
      width: 90px;
      padding: 14px 8px 12px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      text-align: center;
      cursor: pointer;
      position: relative;
      /* expansion transition */
      transition:
        width        0.28s cubic-bezier(0.34,1.2,0.64,1),
        border-color 0.2s,
        background   0.2s,
        box-shadow   0.2s,
        transform    0.2s cubic-bezier(0.34,1.4,0.64,1);
    }

    /* Hover expand — desktop only */
    @media (hover: hover) {
      .char-card:not(.char-card--add):hover {
        width: 148px;
        border-color: rgba(245,217,122,0.5);
        background: rgba(245,217,122,0.06);
        box-shadow: 0 0 28px rgba(245,217,122,0.18),
                    0 8px 24px rgba(0,0,0,0.4);
        transform: translateY(-4px);
      }
    }
    .char-card:active { transform: scale(0.93) translateY(0) !important; }

    .char-card--selected {
      border-color: #f5d97a !important;
      background: rgba(245,217,122,0.09) !important;
      box-shadow: 0 0 24px rgba(245,217,122,0.22),
                  inset 0 0 12px rgba(245,217,122,0.05) !important;
    }

    .char-card--add {
      border-style: dashed;
      border-color: rgba(255,255,255,0.13);
    }
    @media (hover: hover) {
      .char-card--add:hover {
        border-color: rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.07);
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      }
    }

    .char-card-avatar {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 8px;
      transition: transform 0.28s cubic-bezier(0.34,1.2,0.64,1),
                  font-size 0.28s cubic-bezier(0.34,1.2,0.64,1);
      display: block;
    }
    @media (hover: hover) {
      .char-card:not(.char-card--add):hover .char-card-avatar {
        font-size: 3.6rem;
        transform: scale(1.05);
      }
    }
    .char-card--selected .char-card-avatar { transform: scale(1.06); }

    .char-card-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(240,235,224,0.6);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .char-card--selected .char-card-name { color: #f5d97a; }
    @media (hover: hover) {
      .char-card:hover .char-card-name { color: rgba(240,235,224,0.9); }
      .char-card--selected:hover .char-card-name { color: #f5d97a; }
    }

    .char-card-check {
      position: absolute;
      top: 7px; right: 7px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #f5d97a;
      color: #1a1530;
      font-size: 0.65rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.18s, transform 0.22s cubic-bezier(0.34,1.4,0.64,1);
    }
    .char-card--selected .char-card-check { opacity: 1; transform: scale(1); }

    /* ════════════════════════════════════════════════════
       STORY TYPE TILES
       Default: compact emoji pill. Hover: expand wide with
       label + tagline sliding in.
    ════════════════════════════════════════════════════ */
    .type-tile {
      flex-shrink: 0;
      width: 88px;
      padding: 16px 12px 14px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      transition:
        width        0.32s cubic-bezier(0.34,1.15,0.64,1),
        border-color 0.2s,
        background   0.2s,
        box-shadow   0.2s,
        transform    0.2s cubic-bezier(0.34,1.4,0.64,1);
    }

    @media (hover: hover) {
      .type-tile:hover {
        width: 200px;
        border-color: rgba(245,217,122,0.4);
        background: rgba(245,217,122,0.06);
        box-shadow: 0 0 32px rgba(245,217,122,0.15),
                    0 8px 28px rgba(0,0,0,0.45);
        transform: translateY(-5px);
      }
    }
    .type-tile:active { transform: scale(0.93) translateY(0) !important; }

    .type-tile--selected {
      border-color: #f5d97a !important;
      background: rgba(245,217,122,0.08) !important;
      box-shadow: 0 0 28px rgba(245,217,122,0.2) !important;
    }

    .type-tile-emoji {
      font-size: 2.4rem;
      line-height: 1;
      display: block;
      margin-bottom: 0;
      transition: font-size 0.3s cubic-bezier(0.34,1.15,0.64,1),
                  transform 0.3s cubic-bezier(0.34,1.15,0.64,1);
      flex-shrink: 0;
    }
    @media (hover: hover) {
      .type-tile:hover .type-tile-emoji {
        font-size: 2.8rem;
        transform: scale(1.08);
      }
    }

    /* Text content that slides in on hover */
    .type-tile-text {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      transition:
        max-height 0.3s cubic-bezier(0.34,1.1,0.64,1),
        opacity    0.25s ease,
        margin-top 0.3s;
    }
    @media (hover: hover) {
      .type-tile:hover .type-tile-text {
        max-height: 60px;
        opacity: 1;
        margin-top: 10px;
      }
    }
    /* Always show text on selected tile */
    .type-tile--selected .type-tile-text {
      max-height: 60px;
      opacity: 1;
      margin-top: 10px;
    }

    .type-tile-label {
      font-size: 0.92rem;
      font-weight: 800;
      color: rgba(240,235,224,0.85);
      display: block;
      white-space: nowrap;
    }
    .type-tile--selected .type-tile-label { color: #f5d97a; }

    .type-tile-tagline {
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(240,235,224,0.35);
      display: block;
      margin-top: 3px;
      white-space: nowrap;
    }
    .type-tile--selected .type-tile-tagline { color: rgba(245,217,122,0.55); }

    /* ════════════════════════════════════════════════════
       LENGTH PILLS (simple row, no carousel needed)
    ════════════════════════════════════════════════════ */
    .length-row {
      display: flex;
      gap: 10px;
      padding: 0 18px;
    }

    .length-pill {
      flex: 1;
      padding: 14px 8px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition:
        border-color 0.2s,
        background   0.2s,
        box-shadow   0.2s,
        transform    0.18s cubic-bezier(0.34,1.4,0.64,1);
    }
    @media (hover: hover) {
      .length-pill:hover {
        border-color: rgba(245,217,122,0.35);
        background: rgba(245,217,122,0.05);
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      }
    }
    .length-pill:active { transform: scale(0.95) !important; }

    .length-pill--selected {
      border-color: #f5d97a !important;
      background: rgba(245,217,122,0.08) !important;
      box-shadow: 0 0 20px rgba(245,217,122,0.18) !important;
    }

    .length-icon { font-size: 1.4rem; line-height: 1; }

    .length-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: rgba(240,235,224,0.6);
    }
    .length-pill--selected .length-label { color: #f5d97a; }

    .length-time {
      font-size: 0.66rem;
      font-weight: 600;
      color: rgba(240,235,224,0.28);
    }
    .length-pill--selected .length-time { color: rgba(245,217,122,0.5); }

    /* ── Footer ────────────────────────────────────────── */
    .setup-footer {
      padding: 12px 18px 22px;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
    }

    .start-btn {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      background: #f5d97a;
      color: #1a1530;
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 32px rgba(245,217,122,0.28);
      transition: opacity 0.15s,
                  transform 0.15s cubic-bezier(0.34,1.4,0.64,1),
                  box-shadow 0.2s;
    }
    @media (hover: hover) {
      .start-btn:hover {
        box-shadow: 0 0 48px rgba(245,217,122,0.45);
        transform: translateY(-2px);
      }
    }
    .start-btn:active { transform: scale(0.97) !important; opacity: 0.9; }
    .start-btn:disabled { opacity: 0.4; cursor: default; box-shadow: none; }

    /* ── Add character bottom sheet ──────────────────── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-overlay[hidden] { display: none; }

    .sheet-box {
      background: #1a1533;
      border-radius: 24px 24px 0 0;
      padding: 10px 22px 36px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: sheetUp 0.3s cubic-bezier(0.34,1.3,0.64,1) both;
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.16);
      border-radius: 99px;
      margin: 0 auto 8px;
    }

    .sheet-title {
      font-size: 1.1rem;
      font-weight: 900;
      color: #f5d97a;
    }

    .sheet-input {
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 13px;
      background: rgba(255,255,255,0.06);
      color: #f0ebe0;
      padding: 13px 14px;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      width: 100%;
      outline: none;
    }
    .sheet-input::placeholder { color: rgba(240,235,224,0.22); font-weight: 400; }
    .sheet-input:focus { border-color: rgba(245,217,122,0.5); }

    .sheet-actions { display: flex; gap: 8px; }

    .sheet-cancel {
      padding: 12px 18px;
      border-radius: 13px;
      background: rgba(255,255,255,0.07);
      color: rgba(240,235,224,0.55);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; border: none;
    }
    .sheet-confirm {
      flex: 1;
      padding: 12px;
      border-radius: 13px;
      background: #f5d97a;
      color: #1a1530;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      cursor: pointer; border: none;
    }

    @media (max-width: 400px) {
      .char-card { width: 80px; }
      .char-card-avatar { font-size: 2.6rem; }
      .type-tile { width: 80px; }
      .type-tile-emoji { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="setup-shell">
  <canvas id="stars" aria-hidden="true"></canvas>

  <!-- Header -->
  <header class="setup-header">
    <a class="setup-back-btn" href="/" aria-label="Home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="setup-header-text">
      <div class="setup-title">Tonight's Story ✨</div>
      <div class="setup-preview" id="preview">Pick who's in it to begin...</div>
    </div>
  </header>

  {% if error %}
  <div class="setup-error">{{ error }}</div>
  {% endif %}

  <form class="setup-body" method="POST" action="{{ url_for('stories.start') }}" id="setupForm">

    <!-- ── Who's joining? ──────────────────────────────── -->
    <section>
      <div class="setup-section-label">Who's joining?</div>
      <div class="carousel" id="charCarousel">
        {% for char in characters %}
        <button type="button"
                class="char-card {% if char.character_id == preselected_char_id %}char-card--selected{% endif %}"
                data-char-id="{{ char.character_id }}"
                data-char-name="{{ char.name }}"
                aria-pressed="{{ 'true' if char.character_id == preselected_char_id else 'false' }}">
          <span class="char-card-avatar">{{ char.avatar_emoji }}</span>
          <span class="char-card-name">{{ char.name }}</span>
          <span class="char-card-check">✓</span>
        </button>
        {% endfor %}
        <button type="button" class="char-card char-card--add" id="addCharBtn">
          <span class="char-card-avatar">＋</span>
          <span class="char-card-name">Someone new</span>
        </button>
      </div>
    </section>

    <!-- ── What kind of night? ─────────────────────────── -->
    <section>
      <div class="setup-section-label">What kind of night?</div>
      <div class="carousel" id="typeCarousel">
        {% for t in story_types %}
        <button type="button"
                class="type-tile {% if t.key == preselected_type %}type-tile--selected{% endif %}"
                data-type="{{ t.key }}"
                aria-pressed="{{ 'true' if t.key == preselected_type else 'false' }}">
          <span class="type-tile-emoji">{{ t.emoji }}</span>
          <div class="type-tile-text">
            <span class="type-tile-label">{{ t.label }}</span>
            <span class="type-tile-tagline" data-key="{{ t.key }}"></span>
          </div>
        </button>
        {% endfor %}
      </div>
    </section>

    <!-- ── How long? ───────────────────────────────────── -->
    <section>
      <div class="setup-section-label">How long?</div>
      <div class="length-row">
        {% for key, info in length_buckets.items() %}
        <button type="button"
                class="length-pill {% if key == 'medium' %}length-pill--selected{% endif %}"
                data-length="{{ key }}"
                aria-pressed="{{ 'true' if key == 'medium' else 'false' }}">
          <span class="length-icon">{{ '⚡' if key == 'short' else ('🌙' if key == 'medium' else '🌌') }}</span>
          <span class="length-label">{{ info.label.split(' (')[0] }}</span>
          <span class="length-time">{{ info.label.split('(')[1].replace(')', '') if '(' in info.label else '' }}</span>
        </button>
        {% endfor %}
      </div>
    </section>

    <!-- Hidden inputs written by JS -->
    <input type="hidden" name="story_type"    id="inputType"   value="{{ preselected_type }}">
    <input type="hidden" name="length_bucket" id="inputLength" value="medium">

    <div class="setup-footer">
      <button type="submit" class="start-btn" id="startBtn">Begin the Adventure →</button>
    </div>

  </form>
</div>

<!-- Add character bottom sheet -->
<div class="sheet-overlay" id="addSheet" hidden>
  <div class="sheet-box">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Who is it? 🐾</div>
    <input class="sheet-input" type="text" id="newCharName"
           placeholder="Name (e.g. Mochi, Bella, Captain Rex)" maxlength="30" autocomplete="off"/>
    <input class="sheet-input" type="text" id="newCharDesc"
           placeholder="What do they look like? (optional)" maxlength="120" autocomplete="off"/>
    <div class="sheet-actions">
      <button type="button" class="sheet-cancel" id="cancelAdd">Cancel</button>
      <button type="button" class="sheet-confirm" id="confirmAdd">Add to story</button>
    </div>
  </div>
</div>

<script>
"use strict";

// ── Stars ─────────────────────────────────────────────────────────────────────
(function () {
  const c = document.getElementById("stars"), ctx = c.getContext("2d");
  let stars = [];
  const resize = () => { c.width = innerWidth; c.height = innerHeight; };
  const init   = () => { stars = Array.from({length:50}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*1.2+0.3, t: Math.random()*0.4+0.08,
    s: Math.random()*0.005+0.002, p: Math.random()*Math.PI*2
  })); };
  const draw   = t => {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      const o = s.t*(0.6+0.4*Math.sin(t*s.s*60+s.p));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,170,140,${o})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  };
  resize(); init(); requestAnimationFrame(draw);
  addEventListener("resize", () => { resize(); init(); });
}());

// ── State ─────────────────────────────────────────────────────────────────────
const MAX_CHARS = 3;
const TAGLINES  = {
  adventure: "Explore new worlds",
  funny:     "Laugh until sleepy",
  mystery:   "Solve the puzzle",
  cozy:      "Warm and dreamy",
  brave:     "Face your fears",
};

let selectedIds   = new Set({{ ([preselected_char_id] if preselected_char_id else []) | tojson }});
let selectedNames = new Map();
let selectedType  = {{ preselected_type | tojson }};
let selectedLen   = "medium";

// Seed taglines
document.querySelectorAll(".type-tile-tagline").forEach(el => {
  el.textContent = TAGLINES[el.dataset.key] || "";
});

// Seed char names for pre-selected
document.querySelectorAll(".char-card[data-char-id]").forEach(c => {
  const id = parseInt(c.dataset.charId);
  if (selectedIds.has(id)) selectedNames.set(id, c.dataset.charName);
});

// ── Live preview ──────────────────────────────────────────────────────────────
function updatePreview() {
  const el = document.getElementById("preview");
  const names = [...selectedNames.values()];
  if (!names.length) {
    el.textContent = "Pick who's in it to begin...";
    el.classList.remove("is-ready");
    return;
  }
  const nameStr    = names.length === 1 ? names[0]
    : names.slice(0,-1).join(", ") + " & " + names[names.length-1];
  const typeLabel  = document.querySelector(`.type-tile[data-type="${selectedType}"] .type-tile-label`)?.textContent || selectedType;
  const timeEl     = document.querySelector(`.length-pill[data-length="${selectedLen}"] .length-time`);
  const timeStr    = timeEl?.textContent || "";
  el.textContent   = `A ${typeLabel.toLowerCase()} story starring ${nameStr}${timeStr ? " — " + timeStr : ""}`;
  el.classList.add("is-ready");
}
updatePreview();

// ── Characters ────────────────────────────────────────────────────────────────
function toggleChar(card) {
  const id   = parseInt(card.dataset.charId);
  const name = card.dataset.charName;
  if (selectedIds.has(id)) {
    selectedIds.delete(id); selectedNames.delete(id);
    card.classList.remove("char-card--selected");
    card.setAttribute("aria-pressed","false");
  } else {
    if (selectedIds.size >= MAX_CHARS) {
      const oldest = [...selectedIds][0];
      selectedIds.delete(oldest); selectedNames.delete(oldest);
      document.querySelector(`.char-card[data-char-id="${oldest}"]`)
        ?.classList.remove("char-card--selected");
    }
    selectedIds.add(id); selectedNames.set(id, name);
    card.classList.add("char-card--selected");
    card.setAttribute("aria-pressed","true");
  }
  updatePreview();
}

document.querySelectorAll(".char-card[data-char-id]").forEach(c =>
  c.addEventListener("click", () => toggleChar(c))
);

// ── Story type ────────────────────────────────────────────────────────────────
document.querySelectorAll(".type-tile").forEach(tile => {
  tile.addEventListener("click", () => {
    document.querySelectorAll(".type-tile").forEach(t => {
      t.classList.remove("type-tile--selected");
      t.setAttribute("aria-pressed","false");
    });
    tile.classList.add("type-tile--selected");
    tile.setAttribute("aria-pressed","true");
    selectedType = tile.dataset.type;
    document.getElementById("inputType").value = selectedType;
    updatePreview();
  });
});

// ── Length ────────────────────────────────────────────────────────────────────
document.querySelectorAll(".length-pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".length-pill").forEach(p => {
      p.classList.remove("length-pill--selected");
      p.setAttribute("aria-pressed","false");
    });
    pill.classList.add("length-pill--selected");
    pill.setAttribute("aria-pressed","true");
    selectedLen = pill.dataset.length;
    document.getElementById("inputLength").value = selectedLen;
    updatePreview();
  });
});

// ── Add character sheet ───────────────────────────────────────────────────────
const sheet = document.getElementById("addSheet");
document.getElementById("addCharBtn").addEventListener("click", () => {
  sheet.hidden = false;
  document.getElementById("newCharName").focus();
});
document.getElementById("cancelAdd").addEventListener("click", () => { sheet.hidden = true; });
sheet.addEventListener("click", e => { if (e.target === sheet) sheet.hidden = true; });
document.getElementById("confirmAdd").addEventListener("click", addChar);
document.getElementById("newCharName").addEventListener("keydown", e => {
  if (e.key === "Enter") addChar();
});

async function addChar() {
  const name = document.getElementById("newCharName").value.trim();
  const desc = document.getElementById("newCharDesc").value.trim();
  if (!name) return;
  try {
    const r = await fetch("/stories/api/characters", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({name, canonical_description:desc, avatar_emoji:"🐾"}),
    });
    if (!r.ok) throw new Error();
    const char = await r.json();

    const carousel = document.getElementById("charCarousel");
    const addBtn   = document.getElementById("addCharBtn");
    const card     = document.createElement("button");
    card.type = "button";
    card.className = "char-card";
    card.dataset.charId   = char.character_id;
    card.dataset.charName = char.name;
    card.setAttribute("aria-pressed","false");
    card.innerHTML = `
      <span class="char-card-avatar">${char.avatar_emoji}</span>
      <span class="char-card-name">${char.name}</span>
      <span class="char-card-check">✓</span>`;
    card.addEventListener("click", () => toggleChar(card));
    carousel.insertBefore(card, addBtn);
    toggleChar(card);

    sheet.hidden = true;
    document.getElementById("newCharName").value = "";
    document.getElementById("newCharDesc").value = "";
  } catch {
    alert("Couldn't add that character. Please try again.");
  }
}

// ── Submit ────────────────────────────────────────────────────────────────────
document.getElementById("setupForm").addEventListener("submit", () => {
  document.querySelectorAll("input[name='character_ids']").forEach(el => el.remove());
  const form = document.getElementById("setupForm");
  selectedIds.forEach(id => {
    const inp = document.createElement("input");
    inp.type = "hidden"; inp.name = "character_ids"; inp.value = id;
    form.appendChild(inp);
  });
  const btn = document.getElementById("startBtn");
  btn.disabled = true;
  btn.textContent = "Weaving your story...";
});
</script>
</body>
</html>
