{% extends "base.html" %}
{% block title %}{{ story.title }}{% endblock %}
{% block extra_css %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/story.css') }}" />
{% endblock %}

{% block body %}
<div class="btr-shell" id="btrShell">

  <canvas id="btrStarCanvas" class="btr-star-canvas" aria-hidden="true"></canvas>

  <div class="btr-controls" id="btrControls">
    <div class="btr-controls-left">
      <button class="btr-btn btr-btn--back" id="prevBtn" aria-label="Previous page" hidden>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <a class="btr-btn btr-btn--home" href="/" aria-label="Home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
    </div>
    <button class="btr-btn btr-btn--next" id="nextBtn" aria-label="Next page">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div class="btr-page" id="btrPage" role="main"></div>

  <div class="btr-dots" id="btrDots"></div>

  <div class="btr-tap-zone" id="tapZone" aria-label="Tap to continue" role="button" tabindex="0"></div>

</div>
{% endblock %}

{% block extra_js %}
<script>
"use strict";

const STORY_ID    = {{ story_id }};
const PAGES       = {{ story.pages | tojson }};
const STORY_TITLE = {{ story.title | tojson }};
const RECAP_URL   = "/stories/bedtime/" + STORY_ID + "/recap";
const PORTRAIT_URL = {{ portrait_url | tojson }};
const CHAR_NAMES   = {{ char_names | tojson }};

let currentIndex   = 0;
let onSplash       = Boolean(PORTRAIT_URL);
let lastStoryImage = null;  // carries the most recent illustration forward

const imagesByPage = {};
PAGES.forEach(p => { if (p.image_url) imagesByPage[p.page_number] = p.image_url; });

// ── Star canvas ───────────────────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById("btrStarCanvas");
  const ctx    = canvas.getContext("2d");
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        x:      Math.random() * canvas.width,
        y:      Math.random() * canvas.height,
        r:      Math.random() * 1.4 + 0.3,
        target: Math.random() * 0.6 + 0.1,
        speed:  Math.random() * 0.006 + 0.002,
        phase:  Math.random() * Math.PI * 2,
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const opacity = s.target * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 170, 140, ${opacity})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  resize();
  initStars(60);
  requestAnimationFrame(draw);
  window.addEventListener("resize", () => { resize(); initStars(60); });
}());

// ── Progress dots ─────────────────────────────────────────────────────────────
function renderDots(index) {
  const el = document.getElementById("btrDots");
  if (onSplash) { el.innerHTML = ""; return; }
  if (PAGES.length > 20) {
    el.style.cssText = "font-family:'Nunito',sans-serif;font-size:0.75rem;color:rgba(245,217,122,0.5);";
    el.textContent = (index + 1) + " / " + PAGES.length;
    return;
  }
  el.style.cssText = "";
  el.innerHTML = PAGES.map((_, i) =>
    `<div class="btr-dot${i === index ? " btr-dot--active" : ""}"></div>`
  ).join("");
}

// ── Splash page ───────────────────────────────────────────────────────────────
function renderSplash() {
  const pageEl = document.getElementById("btrPage");
  document.getElementById("prevBtn").hidden = true;

  const namesHtml = CHAR_NAMES.length
    ? `<p class="btr-splash-names">${CHAR_NAMES.map(escHtml).join(" &amp; ")}</p>`
    : "";

  pageEl.style.opacity = "0";
  setTimeout(() => {
    pageEl.className = "btr-page btr-page--splash";
    pageEl.style.removeProperty("--ambient-portrait");
    pageEl.innerHTML = `
      <div class="btr-splash-image-wrap">
        <img class="btr-splash-image" src="${escHtml(PORTRAIT_URL)}" alt="" aria-hidden="true" loading="eager" onerror="this.style.display='none'">
      </div>
      <h1 class="btr-splash-title">${escHtml(STORY_TITLE)}</h1>
      ${namesHtml}
      <p class="btr-splash-hint">tap to begin</p>
    `;
    pageEl.style.opacity = "1";
    renderDots(-1);
  }, 80);
}

// ── Story page render ─────────────────────────────────────────────────────────
function renderPage(index) {
  const page   = PAGES[index];
  const pageEl = document.getElementById("btrPage");
  document.getElementById("prevBtn").hidden = (index === 0);

  // Show the page's own image, carry forward the last one, or nothing yet
  const imageToShow = imagesByPage[page.page_number] || lastStoryImage || null;
  if (imageToShow) lastStoryImage = imageToShow;
  const hasImage = Boolean(imageToShow);

  let html = "";
  if (hasImage) {
    html += `<div class="btr-image-wrap">
      <img class="btr-image" src="${escHtml(imageToShow)}" alt="" aria-hidden="true" loading="eager" onerror="this.closest('.btr-image-wrap').style.display='none'">
    </div>`;
  }
  if (index === 0) {
    html += `<h1 class="btr-title">${escHtml(STORY_TITLE)}</h1>`;
  }
  html += `<p class="btr-text">${escHtml(page.text)}</p>`;

  pageEl.style.opacity = "0";
  setTimeout(() => {
    // Ambient portrait used only when no story illustration available yet
    const useAmbient = PORTRAIT_URL && !hasImage;
    pageEl.className = "btr-page" +
      (hasImage   ? " btr-page--has-image" : "") +
      (useAmbient ? " btr-page--ambient"   : "");
    pageEl.innerHTML = html;
    if (useAmbient) pageEl.style.setProperty("--ambient-portrait", `url("${PORTRAIT_URL}")`);
    else            pageEl.style.removeProperty("--ambient-portrait");
    pageEl.style.opacity = "1";
    renderDots(index);
  }, 150);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function advance() {
  if (onSplash) {
    onSplash = false;
    renderPage(0);
    return;
  }
  if (currentIndex < PAGES.length - 1) {
    currentIndex++;
    renderPage(currentIndex);
  } else {
    fetch("/stories/api/bedtime/" + STORY_ID + "/complete", { method: "POST" })
      .catch(() => {});

    document.getElementById("btrShell").style.opacity = "0";
    setTimeout(() => { window.location.href = RECAP_URL; }, 400);
  }
}

function goBack() {
  if (currentIndex > 0) {
    currentIndex--;
    renderPage(currentIndex);
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Input handling ────────────────────────────────────────────────────────────
document.getElementById("tapZone").addEventListener("click", advance);
document.getElementById("tapZone").addEventListener("keydown", e => {
  if (e.key === " " || e.key === "Enter") advance();
});
document.getElementById("prevBtn").addEventListener("click", e => {
  e.stopPropagation();
  goBack();
});
document.getElementById("nextBtn").addEventListener("click", e => {
  e.stopPropagation();
  advance();
});

// ── Image polling ─────────────────────────────────────────────────────────────
let imagesPollTimer = null;
let imagesPollCount = 0;
const MAX_IMAGE_POLLS = 30;

function pollImages() {
  fetch("/stories/api/bedtime/" + STORY_ID + "/images")
    .then(r => r.json())
    .then(data => {
      let newImages = false;
      for (const [pageNum, url] of Object.entries(data.images || {})) {
        const n = parseInt(pageNum);
        if (!imagesByPage[n]) { imagesByPage[n] = url; newImages = true; }
      }
      if (newImages && !onSplash) {
        const currentPage = PAGES[currentIndex];
        if (currentPage && imagesByPage[currentPage.page_number]) {
          const newUrl = imagesByPage[currentPage.page_number];
          const existingImg = document.querySelector("#btrPage .btr-image");
          if (existingImg) {
            existingImg.src = newUrl;
            lastStoryImage = newUrl;
          } else {
            renderPage(currentIndex);
          }
        }
      }
      imagesPollCount++;
      if (imagesPollCount >= MAX_IMAGE_POLLS ||
          Object.keys(data.images || {}).length === PAGES.filter(p => p.illustration_moment).length) {
        clearInterval(imagesPollTimer);
      }
    })
    .catch(() => {});
}

imagesPollTimer = setInterval(pollImages, 2000);

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById("btrShell").style.transition = "opacity 0.4s ease";
if (onSplash) {
  renderSplash();
} else {
  renderPage(0);
}
</script>
{% endblock %}
