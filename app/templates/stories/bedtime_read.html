{% extends "base.html" %}
{% block title %}{{ story.title }}{% endblock %}
{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/story.css') }}" />
{% endblock %}

{% block body %}
<div class="btr-shell" id="btrShell">

  <!-- Minimal controls — small, never compete with text -->
  <div class="btr-controls" id="btrControls">
    <button class="btr-btn btr-btn--back" id="prevBtn" aria-label="Previous page" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <a class="btr-btn btr-btn--home" href="/" aria-label="Home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </a>
  </div>

  <!-- Page display -->
  <div class="btr-page" id="btrPage" role="main">
    <!-- Populated by JS -->
  </div>

  <!-- Tap target — full screen, behind controls -->
  <div class="btr-tap-zone" id="tapZone" aria-label="Tap to continue" role="button" tabindex="0"></div>

</div>
{% endblock %}

{% block extra_js %}
<script>
"use strict";

const STORY_ID  = {{ story_id }};
const PAGES     = {{ story.pages | tojson }};
const STORY_TITLE = {{ story.title | tojson }};
const RECAP_URL = "/stories/bedtime/" + STORY_ID + "/recap";

let currentIndex = 0;

// Images that have arrived: page_number → url
// Populated from the pages data (image_url injected by story_builder)
const imagesByPage = {};
PAGES.forEach(p => { if (p.image_url) imagesByPage[p.page_number] = p.image_url; });

// Skip-and-defer queue: tracks which image we're waiting to show next
let pendingImageUrl = null;

function renderPage(index) {
  const page   = PAGES[index];
  const pageEl = document.getElementById("btrPage");
  const prevEl = document.getElementById("prevBtn");

  prevEl.hidden = index === 0;

  // Build content
  let html = "";

  // Page 1 is always typography-only (title + text)
  if (index === 0) {
    html += `<h1 class="btr-title">${escHtml(STORY_TITLE)}</h1>`;
    html += `<p class="btr-text">${escHtml(page.text)}</p>`;
    pendingImageUrl = null;
  } else {
    // Resolve image: use pending deferred image if available,
    // otherwise use this page's image if ready
    let imageToShow = null;
    if (pendingImageUrl) {
      imageToShow    = pendingImageUrl;
      pendingImageUrl = null;
    } else if (imagesByPage[page.page_number]) {
      imageToShow = imagesByPage[page.page_number];
    } else if (page.illustration_moment && !imagesByPage[page.page_number]) {
      // Image was supposed to be here but isn't ready — defer it
      // (will be surfaced on the next page that has a ready image)
    }

    if (imageToShow) {
      html += `<div class="btr-image-wrap">
        <img class="btr-image" src="${escHtml(imageToShow)}" alt="" aria-hidden="true" loading="eager">
      </div>`;
    }
    html += `<p class="btr-text">${escHtml(page.text)}</p>`;
  }

  // Crossfade
  pageEl.style.opacity = "0";
  setTimeout(() => {
    pageEl.innerHTML = html;
    pageEl.style.opacity = "1";
  }, 150);
}

function advance() {
  if (currentIndex < PAGES.length - 1) {
    currentIndex++;

    // If current page has an illustration but no image yet, check if
    // we should carry a pending image forward
    const page = PAGES[currentIndex];
    if (page.illustration_moment && imagesByPage[page.page_number]) {
      // image arrived since story loaded — pick it up
    } else if (!pendingImageUrl && page.illustration_moment && !imagesByPage[page.page_number]) {
      // defer — pendingImageUrl stays null until an image shows up
    }

    renderPage(currentIndex);
  } else {
    // Last page tapped — mark complete, go to recap
    fetch("/stories/api/bedtime/" + STORY_ID + "/complete", { method: "POST" })
      .catch(() => {}); // fire and forget
    // Fade out then navigate
    document.getElementById("btrShell").style.opacity = "0";
    setTimeout(() => { window.location.href = RECAP_URL; }, 400);
  }
}

function goBack() {
  if (currentIndex > 0) {
    currentIndex--;
    renderPage(currentIndex);
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Input handling ────────────────────────────────────────────────────────────
document.getElementById("tapZone").addEventListener("click", advance);
document.getElementById("tapZone").addEventListener("keydown", e => {
  if (e.key === " " || e.key === "Enter") advance();
});
document.getElementById("prevBtn").addEventListener("click", e => {
  e.stopPropagation();
  goBack();
});

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById("btrShell").style.transition = "opacity 0.4s ease";
renderPage(0);
</script>
{% endblock %}
