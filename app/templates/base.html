<!DOCTYPE html>
<html
  lang="en"
  data-theme="{{ theme | default('light') }}"
  data-band="{{ age_band | default('explorers') }}"
>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <!-- Disable tap highlight on touchscreens -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>{% block title %}Atlas{% endblock %}</title>

  <!-- Apply saved theme before CSS renders to prevent flash -->
  <script>(function(){var t=localStorage.getItem("atlas:theme")||"light";document.documentElement.dataset.theme=t;}());</script>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/atlas.css') }}" />
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/themes/' + (age_band | default('explorers')) + '.css') }}"
  />
  {% block extra_css %}{% endblock %}
  {% if config.POSTHOG_API_KEY %}
  <script>
    !function(t,e){var o,n,p,r;e.__SV||(window.posthog=e,e._i=[],e.init=function(i,s,a){function g(t,e){var o=e.split(".");2==o.length&&(t=t[o[0]],e=o[1]);t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}}(p=t.createElement("script")).type="text/javascript",p.crossOrigin="anonymous",p.async=!0,p.src=s.api_host.replace(".i.posthog.com","-assets.i.posthog.com")+"/static/array.js",(r=t.getElementsByTagName("script")[0]).parentNode.insertBefore(p,r);var u=e;for(void 0!==a?u=e[a]=[]:a="posthog",u.people=u.people||[],u.toString=function(t){var e="posthog";return"posthog"!==a&&(e+="."+a),t||(e+=" (stub)"),e},u.people.toString=function(){return u.toString(1)+" (stub)"},o="init bs ws ge fs capture De setPersonProperties gs register register_once unregister opt_out_capturing has_opted_out_capturing opt_in_capturing reset isFeatureEnabled onFeatureFlags getFeatureFlag getFeatureFlagPayload reloadFeatureFlags group updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures getActiveMatchingSurveys getSurveys getNextSurveyStep onSessionId setPersonPropertiesForFlags".split(" "),n=0;n<o.length;n++)g(u,o[n]);e._i.push([i,s,a])},e.__SV=1)}(document,window.posthog||[]);
    posthog.init("{{ config.POSTHOG_API_KEY }}", {
      api_host: "{{ config.POSTHOG_HOST }}",
      person_profiles: "identified_only",
      {% if session.get("family_id") %}
      bootstrap: { distinctID: "family_{{ session.get('family_id') }}" },
      {% endif %}
    });
    {% if session.get("family_id") %}
    posthog.identify("family_{{ session.get('family_id') }}", {
      profile_name: "{{ session.get('profile_name', '') }}",
    });
    {% endif %}
  </script>
  {% endif %}
</head>
<body>
  {% block body %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
